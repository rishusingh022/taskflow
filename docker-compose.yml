version: "3.8"

services:
  db:
    image: postgres:16-alpine
    # After the image exists locally, compose won't re-pull (helps when Hub is slow).
    pull_policy: missing
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-taskflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-taskflow}
      POSTGRES_DB: ${POSTGRES_DB:-taskflow}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: ${PORT:-8080}
      DATABASE_URL: ${DATABASE_URL:-postgres://taskflow:taskflow@db:5432/taskflow?sslmode=disable}
      JWT_SECRET: ${JWT_SECRET:-super-secret-key-change-in-prod}
    ports:
      - "8080:8080"

volumes:
  pgdata:
